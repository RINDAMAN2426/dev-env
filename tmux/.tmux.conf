# Vim/tmux/ssh 터미널 타입
set -g default-terminal "tmux-256color"
set -s extended-keys on
set -as terminal-features 'xterm*:extkeys'

# cursor style
set -g cursor-style underline

# True Color
set -as terminal-overrides ", xterm-256color:Tc"

# ESC delay 처리
set -g escape-time 0

# focus event
set -g focus-events on

setw -g mode-keys vi

# split 시에 path 유지
unbind %
bind % split-window -h -p 30 -c "#{pane_current_path}"

unbind '"'
bind '"' split-window -v -p 30 -c "#{pane_current_path}"

# Alt + 방향키를 통한 사이즈 조절
bind -n M-h resize-pane -L 5
bind -n M-j resize-pane -D 5
bind -n M-k resize-pane -U 5
bind -n M-l resize-pane -R 5

set -g status-interval 5
set -g status-justify left
set -g status-left-length 40
set -g status-right-length 80

set -g status-left "#[fg=green]#S "
set -g status-right "#[fg=cyan]%Y-%m-%d #[fg=white]%H:%M "

# mouse
set -g mouse on

# nlw: new-layout-window (tmux nlw 로 호출)
set -s command-alias[10] nlw='run-shell "tmux new-window && tmux split-window -h -p 30 && tmux select-pane -L && tmux split-window -v -p 25 && tmux select-pane -t 0"'

# alw: apply-layout-window — 현재 window에 레이아웃 적용 (tmux alw 로 호출)
set -s command-alias[11] alw='run-shell "tmux select-pane -t 0 && tmux kill-pane -a && tmux split-window -h -p 30 && tmux select-pane -L && tmux split-window -v -p 25 && tmux select-pane -t 0"'


